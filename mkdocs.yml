site_name: APM Indus Docs
site_description: Living architecture documentation — maintained by OpenCode

theme:
  name: terminal
  palette: dark
  features:
    - footer.prev_next
    - navigation.side.indexes
    - style.links.underline.hide

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# Mermaid diagram rendering
# Note: if the CDN is blocked on your corporate network,
# download mermaid.min.js locally and change this to: - js/mermaid.min.js
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js